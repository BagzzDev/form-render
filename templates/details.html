{% extends 'base.html' %}
{% block title %}Details{% endblock %}
    {% block content %}
        <h1>Login details</h1>

        {% for d in details %}
            <p>
                <strong>{{ d.email }}></strong>
            </p>
            <p>{{ d.password }}</p>
             <hr> 
        {% endfor %}
        <div class="mt-3">
            <a href="{% url 'index' %}" class="btn btn-primary">Back</a>
        </div>
    {% endblock %}
